name: Deploy to Render

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render API Deploy Hook
        env:
          HOOK_URL: ${{ secrets.RENDER_API_DEPLOY_HOOK }}
        run: |
          if [ -n "$HOOK_URL" ]; then
            echo "Triggering API deployment..."
            curl -s -f -X POST "$HOOK_URL"
          else
            echo "RENDER_API_DEPLOY_HOOK secret is not set, skipping."
          fi

      - name: Trigger Render Frontend Deploy Hook
        env:
          HOOK_URL: ${{ secrets.RENDER_FRONTEND_DEPLOY_HOOK }}
        run: |
          if [ -n "$HOOK_URL" ]; then
            echo "Triggering Frontend deployment..."
            curl -s -f -X POST "$HOOK_URL"
          else
            echo "RENDER_FRONTEND_DEPLOY_HOOK secret is not set, skipping."
          fi
