<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300..700&family=IBM+Plex+Mono:ital,wght@0,400;0,500;0,700;1,400&family=Lexend:wght@100..900&family=Space+Grotesk:wght@400;500;700;900&display=swap" rel="stylesheet">
    <title>FocusForge - Forging Pure Productivity</title>
  </head>
  <body>
    <!-- CRITICAL: This script runs SYNCHRONOUSLY before React/Clerk loads.
         It fires the focusforge:// deep link immediately when Chrome lands on
         /sso-callback after Google OAuth. This prevents Clerk's ClerkProvider
         from intercepting the URL and redirecting Chrome to https://localhost
         (which causes ERR_CONNECTION_REFUSED on mobile). -->
    <script>
      (function () {
        if (window.location.pathname === '/sso-callback') {
          var nativeUrl =
            'focusforge://sso-callback' +
            window.location.search +
            window.location.hash;
          window.location.replace(nativeUrl);
        }
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
