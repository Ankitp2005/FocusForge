services:
  # 1. API Backend (HTTP + WebSocket server)
  - type: web
    name: focusforge-api
    env: node
    plan: free
    autoDeploy: true
    branch: main
    buildCommand: NODE_ENV=development npm install && npm run build
    startCommand: npx prisma migrate deploy --schema=apps/api/prisma/schema.prisma && npm run start:prod
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: NPM_CONFIG_PRODUCTION
        value: false
      - key: REDIS_URL
        fromService:
          type: redis
          name: focusforge-redis
          property: connectionString
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_DATABASE_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: API_URL
        value: https://focusforge-api-pka3.onrender.com
      - key: APP_URL
        value: https://focusforge-frontend-9hi2.onrender.com

  # 2. Background Queue Worker (BullMQ consumer — processes reminders, prioritization, calendar sync)
  #    THIS MUST RUN ALONGSIDE THE API. Without it, all queued reminder jobs sit in Redis unprocessed.
  - type: worker
    name: focusforge-worker
    env: node
    plan: free
    autoDeploy: true
    branch: main
    buildCommand: NODE_ENV=development npm install && npm run build
    startCommand: node dist/worker.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: NPM_CONFIG_PRODUCTION
        value: false
      - key: REDIS_URL
        fromService:
          type: redis
          name: focusforge-redis
          property: connectionString
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_DATABASE_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: APP_URL
        value: https://focusforge-frontend-9hi2.onrender.com

  # 3. Frontend React Client (Static Website Hosting)
  - type: web
    name: focusforge-frontend
    env: static
    autoDeploy: true
    branch: main
    buildCommand: NODE_ENV=development npm install && npm run build --workspace=apps/web
    staticPublishPath: apps/web/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: NODE_ENV
        value: development
      - key: VITE_API_URL
        sync: false
      - key: VITE_CLERK_PUBLISHABLE_KEY
        sync: false

  # 3. Redis Queue Database
  - type: redis
    name: focusforge-redis
    plan: free
    ipAllowList: [] # Private/internal connection only
